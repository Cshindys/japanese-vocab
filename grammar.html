<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日語學習本 — 文法</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <h1><span class="logo-icon">🌸</span> 日語學習本</h1>
    <p>JLPT 單字・文法・閱讀</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">學習內容</div>
    <a class="nav-item" href="index.html">
      <span class="nav-icon">📚</span> 單字庫
      <span class="nav-count" id="sidebarVocabCount">0</span>
    </a>
    <a class="nav-item active" href="grammar.html">
      <span class="nav-icon">📖</span> 文法
      <span class="nav-count" id="sidebarGrammarCount">0</span>
    </a>
    <a class="nav-item" href="reading.html">
      <span class="nav-icon">📄</span> 閱讀文章
      <span class="nav-count" id="sidebarReadingCount">0</span>
    </a>
  </nav>
  <div class="sidebar-stats">
    <div class="stat-row"><span>單字總數</span><span class="stat-val" id="statVocab">0</span></div>
    <div class="stat-row"><span>文法總數</span><span class="stat-val" id="statGrammar">0</span></div>
    <div class="stat-row"><span>文章總數</span><span class="stat-val" id="statReading">0</span></div>
    <button onclick="if(confirm('確定刪除所有文法？此操作無法復原。')){Storage.saveGrammar([]);location.reload();}" style="margin-top:10px;width:100%;padding:5px;font-size:0.72rem;color:#EF4444;background:none;border:1px dashed #EF4444;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-jp);">🗑️ 刪除所有文法</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <button class="hamburger" id="hamburger">☰</button>
    <div class="topbar-title">📖 文法</div>
    <div class="topbar-actions">
      <button class="btn btn-primary" id="btnAddGrammar">＋ 新增文法</button>
    </div>
  </div>

  <div class="content">
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="搜尋文法型、說明...">
      </div>
      <div class="level-filters">
        <button class="level-btn active-all" data-level="全部">全部</button>
        <button class="level-btn" data-level="N5">N5</button>
        <button class="level-btn" data-level="N4">N4</button>
        <button class="level-btn" data-level="N3">N3</button>
        <button class="level-btn" data-level="N2">N2</button>
        <button class="level-btn" data-level="N1">N1</button>
      </div>
      <div class="group-filters" id="groupFilters"></div>
    </div>

    <div class="results-count" id="resultsCount"></div>
    <div class="grammar-list" id="grammarList"></div>
  </div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="editModalTitle">新增文法</div>
      <button class="modal-close" id="editModalClose">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">文法句型</label>
          <input type="text" class="form-input" id="editPattern" placeholder="例：〜は〜です">
        </div>
        <div class="form-group">
          <label class="form-label">JLPT 等級</label>
          <select class="form-select" id="editLevel">
            <option value="N5">N5</option>
            <option value="N4">N4</option>
            <option value="N3">N3</option>
            <option value="N2">N2</option>
            <option value="N1">N1</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:2;">
          <label class="form-label">意思說明</label>
          <input type="text" class="form-input" id="editMeaning" placeholder="例：〜是〜（表示斷定）">
        </div>
        <div class="form-group" style="flex:1;">
          <label class="form-label">分組（可選）</label>
          <input type="text" class="form-input" id="editGroup" placeholder="例：指示詞、助詞">
        </div>
      </div>
      <div class="form-group">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <label class="form-label" style="margin:0;">接續方式</label>
          <button type="button" onclick="addConjugationRow()" style="font-size:0.75rem;padding:2px 10px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text-secondary);cursor:pointer;">＋ 新增</button>
        </div>
        <div id="conjugationsContainer"></div>
      </div>
      <div class="form-group">
        <label class="form-label">詳細說明</label>
        <div class="detail-toolbar">
          <button type="button" onclick="insertDetailBlock('heading')"  title="插入小標題">🔤 小標題</button>
          <button type="button" onclick="insertDetailBlock('divider')"  title="插入分隔線">─ 分隔線</button>
          <button type="button" onclick="insertDetailBlock('callout')"  title="插入注意框">※ 注意</button>
          <button type="button" onclick="insertDetailBlock('note')"     title="插入補充說明">💡 補充</button>
          <button type="button" onclick="insertDetailBlock('arrow')"    title="插入對比規則">⇒ 對比</button>
          <button type="button" onclick="openTableEditor()"            title="插入表格">⊞ 表格</button>
        </div>
        <textarea class="form-textarea" id="editDetail" style="min-height:160px;font-family:var(--font-jp);" placeholder="支援格式：&#10;# 小標題&#10;--- 分隔線&#10;※ 注意事項（開頭 ※ ⚠️ 💡 📌 等）&#10;用「A」問⇒用「B」回答（含⇒的行）&#10;一般文字直接輸入"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">作者 / 來源名稱</label>
          <input type="text" class="form-input" id="editAuthor" placeholder="例：時雨の町">
        </div>
        <div class="form-group">
          <label class="form-label">出處 URL</label>
          <input type="url" class="form-input" id="editSourceUrl" placeholder="例：https://www.sigure.tw/...">
        </div>
      </div>

      <div class="examples-section" style="margin-top:16px;">
        <div class="examples-label">⚔️ 相似文法比較</div>
        <div id="comparisonsContainer"></div>
        <button type="button" class="add-example-btn" id="addComparisonBtn">＋ 新增比較</button>
      </div>

      <div class="examples-section">
        <div class="examples-label">例句</div>
        <div id="examplesContainer"></div>
        <button type="button" class="add-example-btn" id="addExampleBtn">＋ 新增例句</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="editCancelBtn">取消</button>
      <button class="btn btn-danger btn-sm" id="editDeleteBtn" style="display:none;">刪除</button>
      <button class="btn btn-primary" id="editSaveBtn">儲存</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- Table Editor Modal -->
<div class="modal-overlay" id="tableEditorModal" style="display:none;z-index:2000;">
  <div class="modal" style="max-width:700px;">
    <div class="modal-header">
      <div class="modal-title">⊞ 插入表格</div>
      <button class="modal-close" onclick="closeTableEditor()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:10px;">第一列為標題列（藍色底）。按 Tab 鍵可快速移到下一格。</p>
      <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">
        <button class="btn btn-secondary btn-sm" onclick="addTableRow()">＋ 新增列</button>
        <button class="btn btn-secondary btn-sm" onclick="addTableCol()">＋ 新增欄</button>
        <button class="btn btn-secondary btn-sm" onclick="removeTableRow()">－ 刪除最後列</button>
        <button class="btn btn-secondary btn-sm" onclick="removeTableCol()">－ 刪除最後欄</button>
      </div>
      <div style="overflow-x:auto;">
        <table id="tableEditorGrid" class="table-editor-grid"></table>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeTableEditor()">取消</button>
      <button class="btn btn-primary" onclick="insertTableToDetail()">插入</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script>
let currentLevel = '全部';
let currentSearch = '';
let currentGroup = '全部';

async function init() {
  await Storage.loadFromCloud();
  updateSidebarCounts();
  renderGroupFilters();
  renderGrammar();
  setupEventListeners();

  // Handle hash anchor (from reading page links)
  if (window.location.hash) {
    setTimeout(() => {
      const id = window.location.hash.slice(1);
      const card = document.getElementById('gc-' + id);
      if (card) {
        card.classList.add('expanded');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 100);
  }
}

function updateSidebarCounts() {
  const vocab = Storage.getVocab();
  const grammar = Storage.getGrammar();
  const readings = Storage.getReadings();
  document.getElementById('sidebarVocabCount').textContent = vocab.length;
  document.getElementById('sidebarGrammarCount').textContent = grammar.length;
  document.getElementById('sidebarReadingCount').textContent = readings.length;
  document.getElementById('statVocab').textContent = vocab.length;
  document.getElementById('statGrammar').textContent = grammar.length;
  document.getElementById('statReading').textContent = readings.length;
}

function renderGroupFilters() {
  const grammar = Storage.getGrammar();
  const groups = [...new Set(grammar.map(g => g.group || ''))].filter(Boolean).sort((a, b) => a.localeCompare(b, 'zh-TW'));
  const container = document.getElementById('groupFilters');
  if (!groups.length) { container.style.display = 'none'; return; }
  container.style.display = '';
  container.innerHTML = `
    <button class="group-filter-btn active" data-group="全部">全部分組</button>
    ${groups.map(g => `<button class="group-filter-btn" data-group="${escapeHtml(g)}">${escapeHtml(g)}</button>`).join('')}
    <button class="group-filter-btn" data-group="__ungrouped__">未分組</button>
  `;
  container.querySelectorAll('.group-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.group-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentGroup = btn.dataset.group;
      renderGrammar();
    });
  });
}

function renderGrammar() {
  let data = Storage.getGrammar();

  if (currentLevel !== '全部') data = data.filter(g => g.level === currentLevel);
  if (currentGroup === '__ungrouped__') data = data.filter(g => !g.group);
  else if (currentGroup !== '全部') data = data.filter(g => g.group === currentGroup);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    data = data.filter(g =>
      g.pattern.toLowerCase().includes(q) ||
      g.meaning.toLowerCase().includes(q) ||
      (g.conjugation || '').toLowerCase().includes(q)
    );
  }

  const list = document.getElementById('grammarList');
  document.getElementById('resultsCount').textContent = `共 ${data.length} 條文法`;

  if (data.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <h3>找不到文法</h3>
        <p>試試調整篩選條件，或新增第一條文法吧！</p>
      </div>`;
    return;
  }

  // Insert group section headers when viewing all groups without a search filter
  const showHeaders = currentGroup === '全部' && !currentSearch;
  // Sort by group so section headers are always contiguous
  if (showHeaders) {
    data.sort((a, b) => {
      const ga = a.group || '未分組', gb = b.group || '未分組';
      if (ga === '未分組' && gb !== '未分組') return 1;
      if (gb === '未分組' && ga !== '未分組') return -1;
      return ga.localeCompare(gb, 'zh-TW');
    });
  }
  let lastGroupSeen = null;
  const sectionParts = [];
  data.forEach(g => {
    if (showHeaders) {
      const gKey = g.group || '未分組';
      if (gKey !== lastGroupSeen) {
        lastGroupSeen = gKey;
        sectionParts.push(`<div class="grammar-section-header">${escapeHtml(gKey)}</div>`);
      }
    }
    sectionParts.push(cardHtml(g));
  });
  list.innerHTML = sectionParts.join('');
}

function cardHtml(g) { return `
    <div class="grammar-card" id="gc-${g.id}">
      <div class="grammar-card-header" onclick="toggleGrammar('gc-${g.id}')">
        <span class="badge ${getLevelClass(g.level)}">${g.level}</span>
        <span class="grammar-pattern">${g.pattern}</span>
        <span class="grammar-meaning-short">${g.meaning}</span>
        <div class="grammar-card-actions" onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-sm btn-icon" onclick="copyId('${g.id}')" title="複製文法 ID（用於閱讀文章標記）">📋</button>
          <button class="btn btn-ghost btn-sm btn-icon" onclick="openEdit('${g.id}')" title="編輯">✏️</button>
        </div>
        <span class="grammar-chevron">▼</span>
      </div>
      <div class="grammar-card-body">
        ${(() => {
          const conjs = g.conjugations?.length ? g.conjugations
            : [g.conjugation, g.detailedConjugation].filter(Boolean);
          return conjs.map((c, i) => `
            <div class="grammar-conjugation" style="margin-top:${i===0?'14':'6'}px;${i>0?'border-left-color:#7C3AED;':''}">
              ${c}
            </div>`).join('');
        })()}
        ${g.detail ? `<div class="detail-rich">${renderDetail(g.detail)}</div>` : ''}
        <div class="detail-section-title" style="margin-top:16px;">例句</div>
        ${(g.examples || []).map(ex => {
          const hiraganaHtml = ex.hiragana ? `<div class="ex-hiragana">${escapeHtml(ex.hiragana)}</div>` : '';
          const explHtml = ex.explanation ? `<div class="example-explanation">💡 ${ex.explanation.replace(/\n/g,'<br>')}</div>` : '';
          if (ex.type === 'dialogue') {
            const speakers = [...new Set((ex.dialogue||[]).map(l=>l.speaker).filter(Boolean))];
            const bubblesHtml = (ex.dialogue||[]).map(line => {
              const side = line.speaker ? (speakers.indexOf(line.speaker)%2===0?'left':'right') : 'left';
              return `<div class="dialogue-line dialogue-${side}">
                ${line.speaker?`<div class="dialogue-speaker">${escapeHtml(line.speaker)}</div>`:''}
                <div class="dialogue-bubble">${addFurigana(line.text, line.hiragana)}</div>
                ${line.translation?`<div class="dialogue-line-tl">${escapeHtml(line.translation)}</div>`:''}
              </div>`;
            }).join('');
            return `
            <div class="example-card">
              <div class="dialogue-badge">💬 會話文</div>
              ${ex.hiragana ? `<div class="ex-hiragana" style="font-size:0.8rem;color:var(--text-secondary);">${escapeHtml(ex.hiragana)}</div>` : ''}
              <div class="dialogue-container">${bubblesHtml}</div>
              ${ex.translation ? `<div class="example-translation">${escapeHtml(ex.translation)}</div>` : ''}
              ${explHtml}
            </div>`;
          }
          if (ex.type === 'qa') {
            const isNewFormat = ex.answerTranslation !== undefined || ex.answerHiragana !== undefined;
            const qSentHtml = addFurigana(ex.sentence, ex.hiragana);
            const aSentHtml = addFurigana(ex.answer||'', ex.answerHiragana||'');
            const qTlHtml   = isNewFormat && ex.translation      ? `<div class="example-translation">${escapeHtml(ex.translation)}</div>` : '';
            const aTlHtml   = isNewFormat && ex.answerTranslation ? `<div class="example-translation">${escapeHtml(ex.answerTranslation)}</div>` : '';
            const sharedTlHtml = !isNewFormat && ex.translation   ? `<div class="example-translation">${escapeHtml(ex.translation)}</div>` : '';
            return `
            <div class="example-card">
              <div class="ex-qa-block">
                <div class="ex-qa-row">
                  <span class="ex-qa-label ex-qa-q">問</span>
                  <div style="flex:1;min-width:0;">
                    <div class="ex-qa-text">${qSentHtml}</div>
                    ${qTlHtml}
                  </div>
                  <button class="ex-play-btn" onclick="speakWord('${ex.sentence.replace(/'/g,"\\'")}')" title="朗讀">🔊</button>
                </div>
                <div class="ex-qa-row" style="margin-top:8px;">
                  <span class="ex-qa-label ex-qa-a">答</span>
                  <div style="flex:1;min-width:0;">
                    <div class="ex-qa-text">${aSentHtml}</div>
                    ${aTlHtml}
                  </div>
                  <button class="ex-play-btn" onclick="speakWord('${(ex.answer||'').replace(/'/g,"\\'")}')" title="朗讀">🔊</button>
                </div>
              </div>
              ${sharedTlHtml}
              ${explHtml}
            </div>`;
          }
          return `
          <div class="example-card">
            <div class="example-card-top">
              <div class="example-sentence">${ex.hiragana ? addFurigana(ex.sentence, ex.hiragana) : linkVocabInSentence(ex.sentence)}</div>
              <button class="ex-play-btn" onclick="speakWord('${ex.sentence.replace(/'/g,"\\'")}')" title="朗讀">🔊</button>
            </div>
            ${ex.translation ? `<div class="example-translation">${escapeHtml(ex.translation)}</div>` : ''}
            ${explHtml}
          </div>`;
        }).join('') || '<p style="color:var(--text-light);font-size:0.85rem;">尚無例句</p>'}

        ${(g.comparisons || []).length > 0 ? `
          <div class="detail-section-title" style="margin-top:20px;">⚔️ 相似文法比較</div>
          ${(g.comparisons).map(c => `
            <div class="comparison-card">
              <div class="comparison-header">
                <div class="comp-col comp-col-this">
                  <div class="comp-tag comp-tag-this">✅ 本文法</div>
                  <div class="comp-pattern">${g.pattern}</div>
                </div>
                <div class="comp-vs-wrap"><div class="comp-vs-badge">VS</div></div>
                <div class="comp-col comp-col-target">
                  <div class="comp-tag comp-tag-target">⚠️ 相似文法</div>
                  <div class="comp-pattern">${c.target}</div>
                </div>
              </div>
              <div class="comp-row">
                <div class="comp-row-label">📌 核心特徵</div>
                <div class="comp-cell comp-cell-this">
                  <div class="comp-note">${c.thisNote}</div>
                </div>
                <div class="comp-cell comp-cell-target">
                  <div class="comp-note">${c.targetNote}</div>
                </div>
              </div>
              <div class="comp-row">
                <div class="comp-row-label">💬 例句對比</div>
                <div class="comp-cell comp-cell-this">
                  ${(c.thisExamples && c.thisExamples.length ? c.thisExamples : (c.thisExample ? [{text:c.thisExample,translation:c.thisTranslation||''}] : [])).map(e=>`<div class="comp-example">${e.text}</div><div class="comp-translation">${e.translation}</div>`).join('<hr class="cmp-ex-sep">')}
                </div>
                <div class="comp-cell comp-cell-target">
                  ${(c.targetExamples && c.targetExamples.length ? c.targetExamples : (c.targetExample ? [{text:c.targetExample,translation:c.targetTranslation||''}] : [])).map(e=>`<div class="comp-example">${e.text}</div><div class="comp-translation">${e.translation}</div>`).join('<hr class="cmp-ex-sep">')}
                </div>
              </div>
            </div>
          `).join('')}
        ` : ''}

        ${getRelatedVocab(g.id)}
        ${getRelatedGrammar(g)}

        ${g.author || g.sourceUrl ? `
          <div class="grammar-source-bar">
            ${g.author ? `<span>✍️ ${g.author}</span>` : ''}
            ${g.sourceUrl ? `<a href="${g.sourceUrl}" target="_blank" rel="noopener">🔗 查看出處</a>` : ''}
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

function getRelatedGrammar(g) {
  const allGrammar = Storage.getGrammar();
  const seen = new Set();
  const related = [];
  // Grammar items this one compares with
  (g.comparisons || []).forEach(c => {
    const match = allGrammar.find(o => o.pattern === c.target && o.id !== g.id);
    if (match && !seen.has(match.id)) { seen.add(match.id); related.push(match); }
  });
  // Grammar items that compare with this one
  allGrammar.forEach(o => {
    if (o.id === g.id || seen.has(o.id)) return;
    if ((o.comparisons || []).some(c => c.target === g.pattern)) {
      seen.add(o.id); related.push(o);
    }
  });
  if (!related.length) return '';
  return `
    <div class="detail-section-title" style="margin-top:16px;">相關文法</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">
      ${related.map(o => `
        <a href="grammar.html#${o.id}" class="badge ${getLevelClass(o.level)}" style="text-decoration:none;cursor:pointer;">${o.pattern}</a>
      `).join('')}
    </div>`;
}

function getRelatedVocab(grammarId) {
  const vocab = Storage.getVocab().filter(v => (v.grammarIds || []).includes(grammarId));
  return `
    <div class="detail-section-title" style="margin-top:16px;">相關單字</div>
    ${vocab.length === 0
      ? `<p style="font-size:0.82rem;color:var(--text-light);margin-top:6px;">尚無連結單字。可在新增／編輯單字時選擇關聯此文法。</p>`
      : `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">
          ${vocab.map(v => `
            <a href="index.html" style="text-decoration:none;">
              <span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--border);border-radius:6px;font-size:0.82rem;color:var(--text-primary);">

function saveGrammar() {
  const id = document.getElementById('editId').value;
  const pattern = document.getElementById('editPattern').value.trim();
  const level = document.getElementById('editLevel').value;
  const meaning = document.getElementById('editMeaning').value.trim();
  const group = document.getElementById('editGroup').value.trim();
  const conjugations = Array.from(document.querySelectorAll('#conjugationsContainer .conj-input'))
    .map(i => i.value.trim()).filter(Boolean);
  const detail = document.getElementById('editDetail').value.trim();
  const author = document.getElementById('editAuthor').value.trim();
  const sourceUrl = document.getElementById('editSourceUrl').value.trim();

  if (!pattern || !meaning) { showToast('請填寫文法句型與意思', 'error'); return; }

  const cmpItems = document.querySelectorAll('#comparisonsContainer .comparison-item');
  const comparisons = Array.from(cmpItems).map(item => {
    const collectExList = (listSel) => Array.from(item.querySelectorAll(listSel + ' .cmp-ex-row')).map(row => ({
      text: row.querySelector('.cmp-ex-text').value.trim(),
      translation: row.querySelector('.cmp-ex-tl').value.trim()
    })).filter(e => e.text);
    return {
      target: item.querySelector('.cmp-target').value.trim(),
      thisNote: item.querySelector('.cmp-this-note').value.trim(),
      targetNote: item.querySelector('.cmp-target-note').value.trim(),
      thisExamples: collectExList('.cmp-this-list'),
      targetExamples: collectExList('.cmp-target-list')
    };
  }).filter(c => c.target);

  const exItems = document.querySelectorAll('#examplesContainer .example-item');
  const examples = Array.from(exItems).map(item => {
    const type = item.querySelector('.ex-type').value;
    const explanation = item.querySelector('.ex-explanation').value.trim();
    if (type === 'qa') {
      const qf = item.querySelector('.ex-qa-fields');
      const sentence        = qf.querySelector('.ex-sentence').value.trim();
      const hiragana        = qf.querySelector('.ex-q-hiragana').value.trim();
      const translation     = qf.querySelector('.ex-q-translation').value.trim();
      const answer          = qf.querySelector('.ex-answer').value.trim();
      const answerHiragana  = qf.querySelector('.ex-a-hiragana').value.trim();
      const answerTranslation = qf.querySelector('.ex-a-translation').value.trim();
      return sentence ? { type, sentence, hiragana, translation, answer, answerHiragana, answerTranslation, explanation } : null;
    }
    if (type === 'dialogue') {
      const df = item.querySelector('.ex-dialogue-fields');
      const hiragana   = df.querySelector('.ex-hiragana')?.value.trim() || '';
      const translation = df.querySelector('.ex-translation')?.value.trim() || '';
      const dialogue = collectDialogueRows(item);
      return dialogue.length ? { type, hiragana, dialogue, translation, explanation } : null;
    }
    // normal
    const nf = item.querySelector('.ex-normal-fields');
    const hiragana    = nf.querySelector('.ex-hiragana').value.trim();
    const sentence    = nf.querySelector('.ex-sentence').value.trim();
    const translation = nf.querySelector('.ex-translation').value.trim();
    return sentence ? { type, hiragana, sentence, translation, explanation } : null;
  }).filter(Boolean);

  const grammar = Storage.getGrammar();
  if (id) {
    const idx = grammar.findIndex(g => g.id === id);
    if (idx !== -1) grammar[idx] = { ...grammar[idx], pattern, level, meaning, group, conjugations, detail, author, sourceUrl, comparisons, examples };
    showToast('文法已更新', 'success');
  } else {
    grammar.push({ id: Storage.genId('g'), pattern, level, meaning, group, conjugations, detail, author, sourceUrl, comparisons, examples });
    showToast('新增成功', 'success');
  }

  Storage.saveGrammar(grammar);
  const savedId = id || grammar[grammar.length - 1]?.id;
  closeEditModal();
  renderGroupFilters();
  renderGrammar();
  updateSidebarCounts();
  // Auto-expand the saved card so the user can see changes immediately
  if (savedId) {
    const card = document.getElementById('gc-' + savedId);
    if (card) { card.classList.add('expanded'); card.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  }
}

function renderDetail(text) {
  if (!text) return '';
  // Split on [TABLE]...[/TABLE] blocks and process separately
  const segments = [];
  let lastIdx = 0;
  const re = /\[TABLE\]([\s\S]*?)\[\/TABLE\]/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > lastIdx) segments.push({ type: 'text', content: text.slice(lastIdx, m.index) });
    segments.push({ type: 'table', content: m[1] });
    lastIdx = m.index + m[0].length;
  }
  if (lastIdx < text.length) segments.push({ type: 'text', content: text.slice(lastIdx) });
  if (!segments.length) segments.push({ type: 'text', content: text });
  return segments.map(seg => seg.type === 'table' ? renderTableBlock(seg.content) : renderTextBlock(seg.content)).join('');
}

function renderTableBlock(content) {
  const rows = content.trim().split('\n').filter(l => l.trim());
  if (!rows.length) return '';
  let html = '<div class="detail-table-wrap"><table class="detail-table">';
  rows.forEach((row, ri) => {
    const cells = row.split('|');
    html += '<tr>';
    cells.forEach(cell => {
      const tag = ri === 0 ? 'th' : 'td';
      html += `<${tag}>${escapeHtml(cell.trim())}</${tag}>`;
    });
    html += '</tr>';
  });
  html += '</table></div>';
  return html;
}

function renderTextBlock(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let html = '';
  let paraLines = [];

  const flushPara = () => {
    if (paraLines.length) {
      const content = paraLines.join('<br>');
      html += `<p class="detail-para">${content}</p>`;
      paraLines = [];
    }
  };

  for (const raw of lines) {
    const line = raw;
    if (line.trim() === '---') {
      flushPara();
      html += `<hr class="detail-divider">`;
    } else if (/^#{1,3}\s/.test(line)) {
      flushPara();
      const title = line.replace(/^#+\s/, '');
      html += `<div class="detail-heading">${title}</div>`;
    } else if (/^[※⚠️⚡💡📌🔑]\s?/.test(line.trim())) {
      flushPara();
      html += `<div class="detail-callout">${line.trim()}</div>`;
    } else if (line.includes('⇒')) {
      flushPara();
      const parts = line.trim().split('⇒');
      html += `<div class="detail-arrow-row">
        <span class="detail-arrow-left">${parts[0].trim()}</span>
        <span class="detail-arrow-sym">⇒</span>
        <span class="detail-arrow-right">${parts.slice(1).join('⇒').trim()}</span>
      </div>`;
    } else if (line.trim() === '') {
      flushPara();
    } else {
      paraLines.push(line);
    }
  }
  flushPara();
  return html;
}

function renderTableEditorGrid() {
  const table = document.getElementById('tableEditorGrid');
  const rows = tableEditorData.length;
  const cols = tableEditorData[0]?.length || 0;
  let html = '';
  for (let r = 0; r < rows; r++) {
    html += '<tr>';
    for (let c = 0; c < cols; c++) {
      const isHeader = r === 0;
      html += `<td style="padding:2px 3px;"><input type="text" class="table-cell-input${isHeader ? ' table-header-cell' : ''}" value="${escapeHtml(tableEditorData[r][c] || '')}" placeholder="${isHeader ? '標題' : ''}"></td>`;
    }
    html += '</tr>';
  }
  table.innerHTML = html;
}

function addTableRow() {
  syncTableEditorData();
  const cols = tableEditorData[0]?.length || 2;
  tableEditorData.push(new Array(cols).fill(''));
  renderTableEditorGrid();
}

function addTableCol() {
  syncTableEditorData();
  tableEditorData.forEach(row => row.push(''));
  renderTableEditorGrid();
}

function removeTableRow() {
  syncTableEditorData();
  if (tableEditorData.length > 1) { tableEditorData.pop(); renderTableEditorGrid(); }
}

function removeTableCol() {
  syncTableEditorData();
  if ((tableEditorData[0]?.length || 0) > 1) { tableEditorData.forEach(row => row.pop()); renderTableEditorGrid(); }
}

function insertTableToDetail() {
  syncTableEditorData();
  const tableText = '[TABLE]\n' + tableEditorData.map(row => row.join('|')).join('\n') + '\n[/TABLE]';
  const ta = document.getElementById('editDetail');
  const start = ta.selectionStart;
  const before = ta.value.slice(0, start);
  const after  = ta.value.slice(start);
  const needsNewline = before.length && !before.endsWith('\n');
  ta.value = (needsNewline ? before + '\n' : before) + tableText + '\n' + after;
  closeTableEditor();
}

function insertDetailBlock(type) {
  const ta = document.getElementById('editDetail');
  const start = ta.selectionStart;
  const before = ta.value.slice(0, start);
  const after  = ta.value.slice(start);
  const needsNewline = before.length && !before.endsWith('\n');

  const templates = {
    divider:  '\n---\n',
    heading:  '\n# 小標題\n',
    callout:  '\n※ 注意事項\n',
    arrow:    '\n用「これ」問⇒用「それ」回答\n',
    note:     '\n💡 補充說明\n',
  };

  const insert = (needsNewline ? '\n' : '') + templates[type];
  ta.value = before + insert + after;
  const cursor = start + insert.length;
  ta.focus();
  ta.setSelectionRange(cursor, cursor);
}

function linkVocabInSentence(sentence) {
  const allVocab = Storage.getVocab();
  const sorted = [...allVocab].sort((a, b) => b.kanji.length - a.kanji.length);
  let result = sentence;
  const placeholders = [];
  for (const w of sorted) {
    const kanji = w.kanji.split('／')[0].split('/')[0].trim();
    if (!kanji || kanji.length < 1) continue;
    const escaped = kanji.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    result = result.replace(new RegExp(escaped, 'g'), match => {
      const ph = `\x00${placeholders.length}\x00`;
      placeholders.push(`<a href="index.html?search=${encodeURIComponent(kanji)}" class="ex-word-link" title="${w.meaning}">${match}</a>`);
      return ph;
    });
  }
  result = result.replace(/\x00(\d+)\x00/g, (_, i) => placeholders[+i]);
  return result;
}

let _ttsAudio = null;
const _WK_BASE = 'https://raw.githubusercontent.com/tofugu/japanese-vocabulary-pronunciation-audio/master/lib/mp3/';

// speakWord(text) — text is the Japanese sentence/word to speak
// For single vocab words, pass kanji+reading so we can try WaniKani audio first
function speakWord(text, btn, kanji) {
  if (_ttsAudio) { _ttsAudio.pause(); _ttsAudio = null; if (btn) btn.textContent = '🔊'; }
  if (kanji && kanji !== text) {
    // Try WaniKani recorded audio: kanji【よみ】.mp3
    _tryWkAudio(kanji, text, btn);
  } else {
    _speakFallback(text, btn);
  }
}

function _tryWkAudio(kanji, reading, btn) {
  const filename = encodeURIComponent(`${kanji}【${reading}】`) + '.mp3';
  const audio = new Audio(_WK_BASE + filename);
  _ttsAudio = audio;
  if (btn) { btn.textContent = '⏸'; audio.onended = () => { btn.textContent = '🔊'; _ttsAudio = null; }; }
  else { audio.onended = () => { _ttsAudio = null; }; }
  audio.onerror = () => { _ttsAudio = null; if (btn) btn.textContent = '🔊'; _speakFallback(reading, btn); };
  audio.play().catch(() => { _ttsAudio = null; if (btn) btn.textContent = '🔊'; _speakFallback(reading, btn); });
}

function _speakFallback(text, btn) {
  if (btn) btn.textContent = '🔊';
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP'; utter.rate = 0.9;
  const doSpeak = () => {
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
    if (v) utter.voice = v;
    window.speechSynthesis.speak(utter);
  };
  // voices may not be loaded yet on first call
  if (window.speechSynthesis.getVoices().length) doSpeak();
  else window.speechSynthesis.onvoiceschanged = doSpeak;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
